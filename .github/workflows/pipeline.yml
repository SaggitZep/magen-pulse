name: Magen Pulse pipeline
on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
permissions:
  contents: write
concurrency:
  group: magen-pulse-pipeline
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect, classify and score
        run: python scripts/pipeline.py
      - name: Commit state
        run: |
          git config user.name "magen-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update Magen Pulse state"
          git pull --rebase
          git push
