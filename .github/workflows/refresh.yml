name: Recalculate Magen Pulse
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/update_data.py
      - run: |
          git config user.name "magen-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/risk-data.json
          git diff --cached --quiet || git commit -m "Recalculate Magen Pulse V2"
          git push
