<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07111e">
<meta name="description" content="Magen Pulse — הערכת מצב מבוססת מידע גלוי">
<title>Magen Pulse</title>
<style>
:root{
  color-scheme:dark;
  --bg:#07111e;--panel:#0d1928;--panel2:#101f31;--line:#22354d;
  --text:#f4f7fb;--muted:#91a1b5;--soft:#c7d1dd;--accent:#62a8ff;
  --green:#43c984;--yellow:#e5bd58;--orange:#ec8b4a;--red:#e85b67;--violet:#9a79ec;
  --radius:18px;--shadow:0 18px 48px rgba(0,0,0,.22)
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",Arial,sans-serif}
body{background:radial-gradient(circle at 50% -20%,#173454 0,transparent 40%),var(--bg);overflow-x:hidden}
button{font:inherit}
.app{width:min(1180px,100%);min-height:100svh;margin:auto;padding:max(12px,env(safe-area-inset-top)) 14px max(12px,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto 1fr auto;gap:10px}
.topbar{height:42px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:baseline;gap:10px;direction:ltr}.brand strong{font-size:1.22rem;letter-spacing:.02em}.brand span{direction:rtl;color:var(--muted);font-size:.72rem}
.top-actions{display:flex;align-items:center;gap:8px}.health{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:.72rem}.health-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.icon-btn{width:34px;height:34px;border:1px solid var(--line);border-radius:50%;background:rgba(13,25,40,.88);color:var(--soft);cursor:pointer}
.dashboard{min-height:0;display:grid;grid-template-columns:1.08fr .92fr;grid-template-rows:minmax(245px,.92fr) minmax(235px,1.08fr);gap:10px}
.card{background:linear-gradient(180deg,rgba(16,31,49,.97),rgba(11,23,37,.97));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-width:0;min-height:0;overflow:hidden}
.assessment{grid-row:1 / 3;padding:18px;display:grid;grid-template-rows:auto minmax(170px,1fr) auto auto;gap:10px}
.eyebrow{font-size:.72rem;color:var(--muted);font-weight:650}.assessment-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.updated{font-size:.72rem;color:var(--muted);white-space:nowrap}
.gauge-wrap{display:grid;place-items:center;position:relative;min-height:0}.gauge{width:min(330px,86%);height:auto;overflow:visible}.gauge-track{fill:none;stroke:#1c2d42;stroke-width:18;stroke-linecap:round}.gauge-value{fill:none;stroke:var(--green);stroke-width:18;stroke-linecap:round;stroke-dasharray:0 100;filter:drop-shadow(0 0 7px rgba(67,201,132,.25));transition:stroke-dasharray .7s ease,stroke .4s ease}.gauge-center{position:absolute;inset:44% 0 auto;text-align:center;transform:translateY(-50%)}
.main-score{font-size:clamp(3.7rem,8vw,6.2rem);font-weight:800;letter-spacing:-.07em;line-height:.86;direction:ltr}.main-status{font-size:.9rem;color:var(--soft);margin-top:9px}.trend-line{font-size:.74rem;color:var(--muted);margin-top:5px}
.horizons{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.horizon{border:1px solid var(--line);background:rgba(7,17,30,.35);border-radius:13px;padding:9px 7px;text-align:center;cursor:pointer}.horizon.active{border-color:#365c87;background:#102743}.horizon span{display:block;color:var(--muted);font-size:.67rem}.horizon b{display:block;font-size:1.24rem;margin-top:3px;direction:ltr}.horizon em{display:block;font-style:normal;font-size:.61rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.confidence-row{display:flex;align-items:center;gap:10px}.confidence-row span{font-size:.7rem;color:var(--muted);white-space:nowrap}.confidence-track{height:5px;background:#1b2c41;border-radius:999px;overflow:hidden;flex:1}.confidence-fill{height:100%;width:0;background:var(--accent);border-radius:inherit;transition:width .6s ease}.confidence-row b{font-size:.75rem;direction:ltr}
.context{padding:15px;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:9px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.section-title{font-size:.82rem;font-weight:750}.text-btn{border:0;background:none;color:var(--muted);font-size:.67rem;cursor:pointer;padding:2px}
.summary{font-size:.77rem;line-height:1.48;color:var(--soft);margin:0;min-height:2.25em}.drivers{display:grid;gap:5px;align-content:start}.driver{display:grid;grid-template-columns:18px 1fr auto;gap:7px;align-items:center;padding:6px 8px;border-radius:10px;background:rgba(7,17,30,.38);min-width:0}.driver-arrow{font-size:.72rem}.driver.up .driver-arrow{color:var(--orange)}.driver.down .driver-arrow{color:var(--green)}.driver-text{font-size:.69rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.driver-time{font-size:.61rem;color:var(--muted);direction:ltr}
.trend{padding:15px;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px}.trend-head{display:flex;align-items:center;justify-content:space-between}.legend{display:flex;gap:9px;color:var(--muted);font-size:.61rem}.legend i{display:inline-block;width:10px;height:2px;border-radius:9px;margin-left:3px;vertical-align:middle}.chart{min-height:0;position:relative}.chart svg{width:100%;height:100%;display:block}.empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);font-size:.72rem;padding:20px}
.pulse{grid-column:2;padding:15px;display:grid;grid-template-rows:auto minmax(0,1fr);gap:9px}.pulse-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:7px;min-height:0}.pulse-card{border:1px solid var(--line);background:rgba(7,17,30,.42);border-radius:13px;padding:8px;display:grid;grid-template-rows:auto 1fr auto;min-width:0;cursor:pointer;color:inherit;text-align:right}.pulse-top{display:flex;align-items:center;justify-content:space-between;gap:5px}.pulse-icon{font-size:1rem}.pulse-state{font-size:.56rem;color:var(--muted)}.pulse-name{font-size:.66rem;line-height:1.2;align-self:center}.pulse-bottom{display:flex;align-items:end;justify-content:space-between;gap:6px}.pulse-score{font-size:1.18rem;font-weight:750;direction:ltr}.mini-ring{width:22px;height:22px;border-radius:50%;background:conic-gradient(var(--ring) calc(var(--value)*1%),#1a2b40 0);position:relative}.mini-ring:after{content:"";position:absolute;inset:4px;background:#0b1725;border-radius:50%}
.footer{display:flex;align-items:center;justify-content:center;min-height:25px;color:var(--muted);font-size:.64rem;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(2,7,14,.72);backdrop-filter:blur(7px);display:none;align-items:flex-end;justify-content:center;padding:10px;z-index:20}.overlay.open{display:flex}.sheet{width:min(640px,100%);max-height:min(82svh,720px);overflow:auto;background:#0c1928;border:1px solid var(--line);border-radius:22px 22px 14px 14px;padding:18px}.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.sheet h2{font-size:1rem;margin:0}.close{border:0;background:none;color:var(--text);font-size:1.5rem;cursor:pointer}.sheet-body{font-size:.76rem;line-height:1.6;color:var(--soft)}.sheet-body h3{font-size:.76rem;color:var(--text);margin:16px 0 4px}.sheet-body a{color:#8cbfff}.source-row{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.notice{display:none;position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:30;width:min(520px,calc(100% - 24px));padding:9px 12px;border:1px solid #5c4c2b;background:#241f15;border-radius:12px;color:#e5d8b0;font-size:.68rem;text-align:center}
@media(max-width:760px){
  .app{padding:8px;gap:7px}.topbar{height:36px}.brand strong{font-size:1.06rem}.brand span{display:none}.icon-btn{width:30px;height:30px}.health{font-size:.62rem}
  .dashboard{grid-template-columns:1fr;grid-template-rows:minmax(260px,1.08fr) minmax(135px,.58fr) minmax(150px,.66fr);gap:7px}.assessment{grid-row:auto;padding:11px;grid-template-rows:auto minmax(112px,1fr) auto auto;gap:6px}.context{padding:10px;gap:5px}.trend{padding:10px}.pulse{grid-column:auto;padding:10px;gap:6px}
  .gauge{width:min(240px,78%)}.gauge-track,.gauge-value{stroke-width:15}.gauge-center{inset:46% 0 auto}.main-score{font-size:3.45rem}.main-status{font-size:.74rem;margin-top:5px}.trend-line{font-size:.62rem;margin-top:3px}.updated,.eyebrow{font-size:.61rem}
  .horizon{padding:5px 4px;border-radius:10px}.horizon span{font-size:.58rem}.horizon b{font-size:1rem}.horizon em{font-size:.52rem}.confidence-row span,.confidence-row b{font-size:.61rem}
  .summary{font-size:.66rem;line-height:1.35;min-height:0}.drivers{grid-template-columns:1fr 1fr;gap:4px}.driver{padding:4px 6px;grid-template-columns:13px 1fr}.driver:nth-child(n+3){display:none}.driver-text{font-size:.61rem}.driver-time{display:none}.section-title{font-size:.7rem}.legend{font-size:.53rem;gap:5px}
  .pulse-grid{gap:5px}.pulse-card{padding:5px;border-radius:10px}.pulse-name{font-size:.56rem}.pulse-score{font-size:.9rem}.pulse-icon{font-size:.82rem}.pulse-state{font-size:.48rem}.mini-ring{width:17px;height:17px}.mini-ring:after{inset:3px}.footer{font-size:.56rem;min-height:18px}
}
@media(max-width:380px){.pulse-name{font-size:.51rem}.horizon em{display:none}.drivers{grid-template-columns:1fr}.driver:nth-child(2){display:none}.main-score{font-size:3rem}}
@media(min-width:761px){.overlay{align-items:center}.sheet{border-radius:22px}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand"><strong>Magen Pulse</strong><span>הערכת מצב מבוססת מידע גלוי</span></div>
    <div class="top-actions"><div class="health"><span class="health-dot" id="healthDot"></span><span id="healthText">מאתחל</span></div><button class="icon-btn" id="openAbout" aria-label="מידע על המערכת">i</button></div>
  </header>

  <section class="dashboard">
    <article class="card assessment">
      <div class="assessment-head"><span class="eyebrow">הערכת סיכון לתקיפה ישירה על ישראל</span><span class="updated" id="updated">עודכן: —</span></div>
      <div class="gauge-wrap">
        <svg class="gauge" viewBox="0 0 240 145" aria-hidden="true"><path class="gauge-track" pathLength="100" d="M28 124 A92 92 0 0 1 212 124"/><path class="gauge-value" id="gaugeValue" pathLength="100" d="M28 124 A92 92 0 0 1 212 124"/></svg>
        <div class="gauge-center"><div class="main-score" id="mainScore">—</div><div class="main-status" id="mainStatus">ממתין לנתונים</div><div class="trend-line" id="trendLine">—</div></div>
      </div>
      <div class="horizons" id="horizons"></div>
      <div class="confidence-row"><span>רמת ביטחון</span><div class="confidence-track"><div class="confidence-fill" id="confidenceFill"></div></div><b id="confidenceValue">—</b></div>
    </article>

    <article class="card context">
      <div class="section-head"><span class="section-title">מה השתנה?</span><button class="text-btn" id="openDrivers">פירוט</button></div>
      <p class="summary" id="summary">המערכת ממתינה לאיסוף הנתונים הראשון.</p>
      <div class="drivers" id="drivers"></div>
    </article>

    <article class="card trend">
      <div class="trend-head"><span class="section-title">מגמה</span><div class="legend"><span><i style="background:#6faeff"></i>60 דקות</span><span><i style="background:#e5bd58"></i>6 שעות</span><span><i style="background:#9a79ec"></i>24 שעות</span></div></div>
      <div class="chart" id="chartWrap"><svg id="chart" viewBox="0 0 560 155" preserveAspectRatio="none"></svg></div>
    </article>

    <article class="card pulse">
      <div class="section-head"><span class="section-title">מדדי מצב</span><span class="eyebrow" id="coverage">כיסוי: —</span></div>
      <div class="pulse-grid" id="pulseGrid"></div>
    </article>
  </section>
  <footer class="footer">אינו התרעה רשמית ואינו תחליף להנחיות פיקוד העורף.</footer>
</main>

<div class="overlay" id="overlay" role="dialog" aria-modal="true"><div class="sheet"><div class="sheet-head"><h2 id="sheetTitle">פירוט</h2><button class="close" id="closeSheet" aria-label="סגירה">×</button></div><div class="sheet-body" id="sheetBody"></div></div></div>
<div class="notice" id="notice"></div>

<script>
const FALLBACK={mode:'offline',generated_at:null,assessment:{immediate:{label:'60 דקות',score:null,confidence:0,status:'אין נתונים'},short:{label:'6 שעות',score:null,confidence:0,status:'אין נתונים'},extended:{label:'24 שעות',score:null,confidence:0,status:'אין נתונים'}},coverage:{percent:0,available:0,expected:0},velocity:{level:'לא זמין',points_60m:0},changes:[],signals:[],history:[],health:{pipeline:'offline',message:'לא ניתן לטעון את קובץ הנתונים.'},methodology:{formula:''}};
const PULSE_DEFS=[
 {id:'military',name:'פעילות צבאית איראנית',icon:'◉',cats:['capability']},
 {id:'readiness',name:'היערכות אזרחית',icon:'✚',cats:['israel_readiness']},
 {id:'defense',name:'פיקוד העורף',icon:'⬡',cats:['israel_readiness'],terms:['פיקוד העורף','home front']},
 {id:'aviation',name:'תעופה',icon:'✈',terms:['airspace','aviation','flight','notam','מרחב אווירי','טיס']},
 {id:'maritime',name:'ספנות',icon:'≋',terms:['ship','naval','maritime','port','ספנות','נמל']},
 {id:'infra',name:'תקשורת וניווט',icon:'⌁',terms:['gps','communication','internet','jamming','תקשורת','שיבוש']},
 {id:'regional',name:'פעילות אזורית',icon:'◎',cats:['regional_escalation']},
 {id:'strategic',name:'איתותים אסטרטגיים',icon:'▤',cats:['direct_intent']}
];
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const riskColor=v=>v==null?'#91a1b5':v<20?'#43c984':v<40?'#e5bd58':v<60?'#ec8b4a':v<80?'#e85b67':'#9a79ec';
const stateLabel=v=>v==null?'אין נתונים':v<20?'רגיל':v<40?'מוגבר':v<60?'גבוה':v<80?'חריג':'קיצוני';
const fmtTime=t=>t?new Date(t).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Jerusalem'}):'—';
let DATA=FALLBACK,activeHorizon='immediate';
function signalMatches(s,d){const txt=((s.name||'')+' '+(s.finding||'')).toLowerCase();return (d.cats||[]).includes(s.category)||(d.terms||[]).some(t=>txt.includes(t));}
function pulseData(d){return PULSE_DEFS.map(def=>{const items=(d.signals||[]).filter(s=>signalMatches(s,def)&&s.active!==false);if(!items.length)return {...def,score:null,confidence:0,items:[]};const vals=items.map(s=>Math.max(0,Math.abs(s.computed?.[activeHorizon]??0)));const score=Math.min(100,Math.round(100*(1-vals.reduce((r,v)=>r*(1-Math.min(.95,v/100)),1))));const confidence=Math.round(items.reduce((a,s)=>a+((s.reliability||0)*(s.freshness||0)),0)/items.length*100);return {...def,score,confidence,items:items.sort((a,b)=>Math.abs(b.computed?.[activeHorizon]||0)-Math.abs(a.computed?.[activeHorizon]||0))};});}
function summaryText(d){const a=d.assessment?.[activeHorizon];if(a?.score==null)return d.health?.message||'אין די נתונים להצגת הערכה.';const delta=d.velocity?.points_60m||0;const movement=delta>1?'נרשמה עלייה בהערכה האחרונה.':delta<-1?'נרשמה ירידה בהערכה האחרונה.':'התמונה יציבה מאז העדכון הקודם.';return `${movement} ההערכה לחלון של ${a.label} היא ${a.status}, על סמך המידע הגלוי שנאסף.`;}
function render(d){DATA=d;const a=d.assessment?.[activeHorizon]||{};const score=a.score;
 $('mainScore').textContent=score==null?'—':score+'%';$('mainStatus').textContent=a.status||'אין נתונים';$('updated').textContent='עודכן: '+fmtTime(d.generated_at);$('gaugeValue').style.stroke=riskColor(score);$('gaugeValue').style.strokeDasharray=`${score??0} 100`;
 const delta=d.velocity?.points_60m||0;$('trendLine').textContent=delta>1?`בעלייה · ‎+${delta} נק׳`:delta<-1?`בירידה · ${delta} נק׳`:'יציב';
 $('horizons').innerHTML=['immediate','short','extended'].map(k=>{const x=d.assessment?.[k]||{};return `<button class="horizon ${k===activeHorizon?'active':''}" data-h="${k}"><span>${esc(x.label||'—')}</span><b style="color:${riskColor(x.score)}">${x.score==null?'—':x.score+'%'}</b><em>${esc(x.status||'')}</em></button>`}).join('');document.querySelectorAll('.horizon').forEach(b=>b.onclick=()=>{activeHorizon=b.dataset.h;render(DATA)});
 const conf=a.confidence||0;$('confidenceFill').style.width=conf+'%';$('confidenceValue').textContent=conf?conf+'%':'—';$('coverage').textContent=`כיסוי: ${d.coverage?.available??0}/${d.coverage?.expected??0}`;$('summary').textContent=summaryText(d);
 const changes=(d.changes||[]).slice(0,4);$('drivers').innerHTML=changes.length?changes.map((x,i)=>`<div class="driver ${i<3?'up':'down'}"><span class="driver-arrow">${i<3?'▲':'▼'}</span><span class="driver-text">${esc(x.text)}</span><span class="driver-time">${esc(x.time||'')}</span></div>`).join(''):'<div class="empty">אין שינוי משמעותי להצגה.</div>';
 const pulses=pulseData(d);$('pulseGrid').innerHTML=pulses.map(p=>`<button class="pulse-card" data-pulse="${p.id}"><span class="pulse-top"><span class="pulse-icon">${p.icon}</span><span class="pulse-state">${stateLabel(p.score)}</span></span><span class="pulse-name">${p.name}</span><span class="pulse-bottom"><b class="pulse-score" style="color:${riskColor(p.score)}">${p.score==null?'—':p.score}</b><span class="mini-ring" style="--value:${p.score??0};--ring:${riskColor(p.score)}"></span></span></button>`).join('');document.querySelectorAll('[data-pulse]').forEach(b=>b.onclick=()=>openPulse(pulses.find(p=>p.id===b.dataset.pulse)));
 draw(d.history||[]);renderHealth(d);if(d.mode!=='live'&&d.mode!=='initializing'){showNotice(d.health?.message||'כיסוי הנתונים חלקי.');}
}
function renderHealth(d){const ok=d.mode==='live',init=d.mode==='initializing';$('healthText').textContent=ok?'המערכת פעילה':init?'מאתחל':'כיסוי חלקי';$('healthDot').style.background=ok?'#43c984':init?'#91a1b5':'#e5bd58';}
function draw(h){const svg=$('chart');if(h.length<2){svg.innerHTML='<text x="280" y="80" fill="#91a1b5" text-anchor="middle" font-size="13">המגמה תופיע לאחר שני עדכונים</text>';return}const data=h.slice(-48),W=560,H=155,m={l:24,r:8,t:8,b:18},w=W-m.l-m.r,hh=H-m.t-m.b,x=i=>m.l+i*w/(data.length-1),y=v=>m.t+hh-(Number(v)||0)/100*hh;let out='';[0,25,50,75,100].forEach(v=>out+=`<line x1="${m.l}" y1="${y(v)}" x2="${W-m.r}" y2="${y(v)}" stroke="rgba(255,255,255,.07)"/><text x="${m.l-5}" y="${y(v)+3}" fill="#718399" font-size="8" text-anchor="end">${v}</text>`);[['immediate','#6faeff',3],['short','#e5bd58',2],['extended','#9a79ec',2]].forEach(([k,c,sw])=>{const pts=data.map((p,i)=>`${x(i)},${y(p[k])}`).join(' ');out+=`<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>`});svg.innerHTML=out;}
function openSheet(title,html){$('sheetTitle').textContent=title;$('sheetBody').innerHTML=html;$('overlay').classList.add('open');}
function openPulse(p){const sources=p.items.slice(0,8).map(s=>`<div class="source-row"><b>${esc(s.name)}</b><br><span>${esc(s.source||'מקור פומבי')} · השפעה ${Number(s.computed?.[activeHorizon]||0).toFixed(1)}</span>${s.url?`<br><a href="${esc(s.url)}" target="_blank" rel="noopener">פתיחת המקור</a>`:''}</div>`).join('');openSheet(p.name,`<p><b>מצב:</b> ${stateLabel(p.score)}${p.score!=null?` · ${p.score}/100`:''}</p><p><b>רמת ביטחון:</b> ${p.confidence?p.confidence+'%':'אין די נתונים'}</p><p>המדד מרכז את האינדיקציות הגלויות הרלוונטיות לחלון הזמן שנבחר. הציון משקף את עוצמת האותות הפעילים, לא הסתברות עצמאית לאירוע.</p><h3>אינדיקציות פעילות</h3>${sources||'<p>לא נמצאו אינדיקציות פעילות בקטגוריה זו.</p>'}`);}
$('openDrivers').onclick=()=>openSheet('מה השתנה?',(DATA.changes||[]).map(x=>`<div class="source-row"><b>${esc(x.text)}</b><br><span>${esc(x.impact||'')}</span></div>`).join('')||'<p>אין שינוי משמעותי להצגה.</p>');
$('openAbout').onclick=()=>openSheet('על Magen Pulse',`<p>Magen Pulse אוסף ומנתח מידע פומבי כדי להציג הערכת מצב שקופה בשלושה חלונות זמן.</p><h3>מתודולוגיה</h3><p>${esc(DATA.methodology?.formula||'')}</p><p>הערכה זו אינה הסתברות סטטיסטית מוכחת, אינה התרעה רשמית ואינה מחליפה את הנחיות פיקוד העורף.</p>`);
$('closeSheet').onclick=()=>$('overlay').classList.remove('open');$('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').classList.remove('open')};document.addEventListener('keydown',e=>{if(e.key==='Escape')$('overlay').classList.remove('open')});
function showNotice(msg){$('notice').textContent=msg;$('notice').style.display='block';setTimeout(()=>$('notice').style.display='none',5000)}
fetch('data/state.json?v='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error();return r.json()}).then(render).catch(()=>render(FALLBACK));
</script>
</body>
</html>
